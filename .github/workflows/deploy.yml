name: Deploy to Oracle VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create DB config from secrets
        run: |
          cat > config/db.local.php << 'EOF'
          <?php
          return [
              'DB_ENABLED' => true,
              'DB_DRIVER'  => 'mysql',
              'DB_HOST'    => '${{ secrets.DB_HOST }}',
              'DB_PORT'    => '3306',
              'DB_NAME'    => '${{ secrets.DB_NAME }}',
              'DB_USER'    => '${{ secrets.DB_USER }}',
              'DB_PASS'    => '${{ secrets.DB_PASS }}',
              'DB_CHARSET' => 'utf8mb4',
          ];
          EOF

      - name: Deploy via SSH rsync
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete --exclude='.git*' --exclude='node_modules/' --exclude='.github/'
          path: ./
          remote_path: /var/www/harmonymatch/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Fix permissions and reload services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R www-data:www-data /var/www/harmonymatch
            sudo nginx -t
            sudo systemctl reload nginx
            sudo systemctl restart php8.1-fpm
