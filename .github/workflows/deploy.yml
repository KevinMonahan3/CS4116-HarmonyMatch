name: Deploy to Oracle VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create DB config from secrets
        run: |
          cat > config/db.local.php << 'EOF'
          <?php
          return [
              'DB_ENABLED' => true,
              'DB_DRIVER'  => 'mysql',
              'DB_HOST'    => '${{ secrets.DB_HOST }}',
              'DB_PORT'    => '3306',
              'DB_NAME'    => '${{ secrets.DB_NAME }}',
              'DB_USER'    => '${{ secrets.DB_USER }}',
              'DB_PASS'    => '${{ secrets.DB_PASS }}',
              'DB_CHARSET' => 'utf8mb4',
          ];
          EOF

      - name: Deploy via SSH rsync
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -rlptDz --delete --exclude='.git*' --exclude='node_modules/' --exclude='.github/'
          path: ./
          remote_path: /home/${{ secrets.SSH_USER }}/harmonymatch-staging/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Publish staging build and reload services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /var/www/harmonymatch
            sudo rsync -rlptDz --delete /home/${{ secrets.SSH_USER }}/harmonymatch-staging/ /var/www/harmonymatch/
            sudo rm -rf /home/${{ secrets.SSH_USER }}/harmonymatch-staging
            sudo mkdir -p /var/www/harmonymatch-shared/config /var/www/harmonymatch-shared/uploads /var/www/harmonymatch/assets/img
            if [ -f /var/www/harmonymatch-shared/config/resend.local.php ]; then
              sudo ln -sfn /var/www/harmonymatch-shared/config/resend.local.php /var/www/harmonymatch/config/resend.local.php
            fi
            sudo rm -rf /var/www/harmonymatch/assets/img/uploads
            sudo ln -sfn /var/www/harmonymatch-shared/uploads /var/www/harmonymatch/assets/img/uploads
            sudo chown -R www-data:www-data /var/www/harmonymatch
            sudo chown -R www-data:www-data /var/www/harmonymatch-shared
            sudo chmod 640 /var/www/harmonymatch/config/db.local.php
            if [ -f /var/www/harmonymatch/config/resend.local.php ]; then
              sudo chmod 640 /var/www/harmonymatch/config/resend.local.php
            fi
            sudo nginx -t
            sudo systemctl reload nginx
            sudo systemctl restart php8.1-fpm
